; Warcry CMS dev defaults
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL

memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60

date.timezone = UTC

; Session cookie flags (httponly, samesite, secure) are configured by the
; application at session_start() — see engine/classes/sessions.*.php — so the
; secure flag is enabled automatically under HTTPS without breaking the local
; Docker stack on http://localhost.

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.max_accelerated_files = 20000
