; Warcry CMS dev defaults
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL

memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60

date.timezone = UTC

; Session cookie defaults. The secure flag is set to 1 here so HTTPS clients
; get a hardened cookie out of the box. The runtime in
; engine/classes/sessions.*.php still calls session_set_cookie_params() with
; the actual HTTPS state, which is what governs the cookie at request time
; (and lets the http://localhost dev stack keep working).
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.max_accelerated_files = 20000
